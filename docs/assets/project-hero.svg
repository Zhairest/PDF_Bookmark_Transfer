<svg width="1440" height="840" viewBox="0 0 1440 840" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="1280" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="0.5" stop-color="#EEF6FF"/>
      <stop offset="1" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="panel" x1="190" y1="156" x2="1190" y2="682" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F766E"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="cardGlow" x1="960" y1="180" x2="1208" y2="648" gradientUnits="userSpaceOnUse">
      <stop stop-color="#DBEAFE"/>
      <stop offset="1" stop-color="#CCFBF1"/>
    </linearGradient>
    <filter id="shadow" x="120" y="94" width="1200" height="652" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#0F172A" flood-opacity="0.14"/>
    </filter>
    <filter id="soft" x="812" y="140" width="468" height="570" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
    <style>
      .eyebrow { font: 700 15px "SF Pro Text", "Segoe UI", "Helvetica Neue", Arial, sans-serif; letter-spacing: 0.14em; fill: #0F766E; }
      .title { font: 700 52px "SF Pro Display", "Segoe UI", "Helvetica Neue", Arial, sans-serif; fill: #0F172A; }
      .subtitle { font: 500 22px "SF Pro Text", "Segoe UI", "Helvetica Neue", Arial, sans-serif; fill: #334155; }
      .chip { font: 700 14px "SF Pro Text", "Segoe UI", "Helvetica Neue", Arial, sans-serif; fill: #0F172A; }
      .cardTitle { font: 700 17px "SF Pro Text", "Segoe UI", "Helvetica Neue", Arial, sans-serif; fill: #0F172A; }
      .body { font: 500 15px "SF Pro Text", "Segoe UI", "Helvetica Neue", Arial, sans-serif; fill: #475569; }
      .small { font: 600 13px "SF Pro Text", "Segoe UI", "Helvetica Neue", Arial, sans-serif; fill: #64748B; }
      .windowTitle { font: 700 20px "SF Pro Display", "Segoe UI", "Helvetica Neue", Arial, sans-serif; fill: #0F172A; }
      .windowLabel { font: 600 13px "SF Pro Text", "Segoe UI", "Helvetica Neue", Arial, sans-serif; fill: #0F172A; }
      .windowBody { font: 500 12px "SF Pro Text", "Segoe UI", "Helvetica Neue", Arial, sans-serif; fill: #475569; }
      .cta { font: 700 15px "SF Pro Text", "Segoe UI", "Helvetica Neue", Arial, sans-serif; fill: #FFFFFF; }
      .stat { font: 700 28px "SF Pro Display", "Segoe UI", "Helvetica Neue", Arial, sans-serif; fill: #0F172A; }
    </style>
  </defs>

  <rect width="1440" height="840" fill="url(#bg)"/>
  <circle cx="156" cy="132" r="82" fill="#E0F2FE"/>
  <circle cx="1290" cy="110" r="64" fill="#DCFCE7"/>
  <circle cx="1326" cy="726" r="102" fill="#E0E7FF"/>
  <circle cx="220" cy="760" r="120" fill="#FEF3C7"/>

  <g filter="url(#shadow)">
    <rect x="160" y="134" width="1120" height="572" rx="34" fill="white"/>
  </g>

  <rect x="160" y="134" width="1120" height="572" rx="34" fill="white"/>
  <rect x="160" y="134" width="1120" height="86" rx="34" fill="#F8FAFC"/>
  <rect x="160" y="176" width="1120" height="530" rx="0" fill="white"/>
  <circle cx="208" cy="177" r="7" fill="#FB7185"/>
  <circle cx="232" cy="177" r="7" fill="#FBBF24"/>
  <circle cx="256" cy="177" r="7" fill="#34D399"/>

  <text x="228" y="286" class="eyebrow">PDF BOOKMARK TRANSFER</text>

  <text x="228" y="362" class="title">Merge sharp pages</text>
  <text x="228" y="422" class="title">with real PDF bookmarks</text>

  <text x="228" y="482" class="subtitle">Keep the page quality from one export and copy the outline tree</text>
  <text x="228" y="514" class="subtitle">from another, without rebuilding the document from scratch.</text>

  <rect x="228" y="554" width="182" height="38" rx="19" fill="#E6FFFB"/>
  <text x="256" y="578" class="chip">Qt desktop GUI</text>

  <rect x="424" y="554" width="188" height="38" rx="19" fill="#DBEAFE"/>
  <text x="452" y="578" class="chip">CLI included</text>

  <rect x="626" y="554" width="222" height="38" rx="19" fill="#FEF3C7"/>
  <text x="654" y="578" class="chip">macOS + Windows</text>

  <rect x="228" y="626" width="302" height="46" rx="16" fill="url(#panel)"/>
  <text x="264" y="655" class="cta">High-res pages + working outline</text>

  <rect x="228" y="706" width="160" height="92" rx="22" fill="#F8FAFC"/>
  <text x="252" y="744" class="stat">No re-render</text>
  <text x="252" y="770" class="small">page content stays intact</text>

  <rect x="404" y="706" width="160" height="92" rx="22" fill="#F8FAFC"/>
  <text x="428" y="744" class="stat">Bookmarks</text>
  <text x="428" y="770" class="small">outline tree is preserved</text>

  <rect x="580" y="706" width="160" height="92" rx="22" fill="#F8FAFC"/>
  <text x="604" y="744" class="stat">Ready</text>
  <text x="604" y="770" class="small">for release packaging</text>

  <g filter="url(#soft)">
    <rect x="854" y="168" width="390" height="502" rx="28" fill="url(#cardGlow)"/>
  </g>

  <rect x="886" y="196" width="326" height="446" rx="28" fill="white"/>
  <rect x="886" y="196" width="326" height="58" rx="28" fill="#F8FAFC"/>
  <circle cx="914" cy="225" r="5.5" fill="#FB7185"/>
  <circle cx="934" cy="225" r="5.5" fill="#FBBF24"/>
  <circle cx="954" cy="225" r="5.5" fill="#34D399"/>
  <text x="980" y="233" class="windowTitle">Desktop Flow</text>

  <rect x="916" y="278" width="266" height="92" rx="20" fill="#F8FAFC"/>
  <rect x="936" y="298" width="48" height="52" rx="14" fill="#DBEAFE"/>
  <path d="M949 338H971" stroke="#2563EB" stroke-width="3.2" stroke-linecap="round"/>
  <path d="M949 325H968" stroke="#2563EB" stroke-width="3.2" stroke-linecap="round"/>
  <text x="1004" y="318" class="cardTitle">Content PDF</text>
  <text x="1004" y="340" class="windowBody">keeps the sharp pages</text>

  <rect x="916" y="390" width="266" height="92" rx="20" fill="#F8FAFC"/>
  <rect x="936" y="410" width="48" height="52" rx="14" fill="#CCFBF1"/>
  <path d="M949 420H971" stroke="#0F766E" stroke-width="3.2" stroke-linecap="round"/>
  <path d="M949 433H971" stroke="#0F766E" stroke-width="3.2" stroke-linecap="round"/>
  <path d="M949 446H967" stroke="#0F766E" stroke-width="3.2" stroke-linecap="round"/>
  <text x="1004" y="430" class="cardTitle">Bookmark source PDF</text>
  <text x="1004" y="452" class="windowBody">provides the outline tree</text>

  <rect x="1018" y="494" width="62" height="62" rx="20" fill="url(#panel)"/>
  <path d="M1036 525H1061" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <path d="M1049 513L1061 525L1049 537" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="916" y="576" width="266" height="82" rx="20" fill="#F8FAFC"/>
  <text x="936" y="610" class="windowLabel">Output</text>
  <text x="936" y="634" class="cardTitle">Sharp pages + clickable bookmarks</text>

  <rect x="264" y="246" width="192" height="28" rx="14" fill="#DCFCE7"/>
  <text x="288" y="265" class="small">Preserve page fidelity</text>
</svg>
